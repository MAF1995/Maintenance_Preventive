<svg width="1500" height="1240" viewBox="0 0 1500 1240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .legend { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .node-title { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .node-text { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .core { fill: #f8fafc; stroke: #334155; stroke-width: 2; }
      .support { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
      .flow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .control { stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="1240"/>
  <rect class="frame" x="30" y="30" width="1440" height="1180" rx="18"/>

  <text x="70" y="78" class="title">Pipeline MLOps de maintenance predictive</text>
  <text x="70" y="106" class="subtitle">Vue d'ensemble du flux de donnees, du serving, du monitoring et de l'automatisation.</text>

  <line x1="1040" y1="78" x2="1090" y2="78" class="flow"/>
  <text x="1100" y="83" class="legend">Flux principal</text>
  <line x1="1230" y1="78" x2="1280" y2="78" class="control"/>
  <text x="1290" y="83" class="legend">Orchestration</text>

  <g transform="translate(620 60)">
    <rect class="core" width="260" height="96" rx="12"/>
    <text x="20" y="32" class="node-title">Donnees brutes</text>
    <text x="20" y="56" class="node-text">PS2.txt, FS1.txt, profile.txt</text>
    <text x="20" y="76" class="node-text">Un cycle de production par ligne</text>
  </g>

  <g transform="translate(620 210)">
    <rect class="core" width="260" height="96" rx="12"/>
    <text x="20" y="32" class="node-title">Feature engineering</text>
    <text x="20" y="56" class="node-text">engineering.py</text>
    <text x="20" y="76" class="node-text">Feature store: data/processed/feature_store.csv</text>
  </g>

  <g transform="translate(620 360)">
    <rect class="core" width="260" height="96" rx="12"/>
    <text x="20" y="32" class="node-title">Training baseline</text>
    <text x="20" y="56" class="node-text">train.py - RandomForestClassifier</text>
    <text x="20" y="76" class="node-text">2000 cycles train, 205 cycles test</text>
  </g>

  <g transform="translate(960 360)">
    <rect class="support" width="260" height="96" rx="12"/>
    <text x="20" y="32" class="node-title">Versioning local</text>
    <text x="20" y="56" class="node-text">dataset_version.json</text>
    <text x="20" y="76" class="node-text">model_version.json</text>
  </g>

  <g transform="translate(280 360)">
    <rect class="support" width="260" height="96" rx="12"/>
    <text x="20" y="32" class="node-title">MLflow tracking</text>
    <text x="20" y="56" class="node-text">params, metrics, artifacts</text>
    <text x="20" y="76" class="node-text">Tracking UI sur :5000</text>
  </g>

  <g transform="translate(620 620)">
    <rect class="core" width="260" height="96" rx="12"/>
    <text x="20" y="32" class="node-title">Artifacts locaux</text>
    <text x="20" y="56" class="node-text">modele joblib, metrics json</text>
    <text x="20" y="76" class="node-text">predictions csv</text>
  </g>

  <g transform="translate(620 770)">
    <rect class="core" width="260" height="96" rx="12"/>
    <text x="20" y="32" class="node-title">FastAPI serving</text>
    <text x="20" y="56" class="node-text">/predict, /model/metrics, /metrics</text>
    <text x="20" y="76" class="node-text">API locale :8010, Docker :8011</text>
  </g>

  <g transform="translate(280 770)">
    <rect class="support" width="260" height="96" rx="12"/>
    <text x="20" y="32" class="node-title">UI web legere</text>
    <text x="20" y="56" class="node-text">Interface servie par FastAPI</text>
    <text x="20" y="76" class="node-text">Disponible sur /ui</text>
  </g>

  <g transform="translate(960 770)">
    <rect class="support" width="260" height="96" rx="12"/>
    <text x="20" y="32" class="node-title">Streamlit</text>
    <text x="20" y="56" class="node-text">Visualisation temporelle</text>
    <text x="20" y="76" class="node-text">Disponible sur :8501</text>
  </g>

  <g transform="translate(620 920)">
    <rect class="core" width="260" height="96" rx="12"/>
    <text x="20" y="32" class="node-title">Prometheus</text>
    <text x="20" y="56" class="node-text">Scrape de /metrics</text>
    <text x="20" y="76" class="node-text">Metriques techniques et applicatives</text>
  </g>

  <g transform="translate(620 1070)">
    <rect class="core" width="260" height="96" rx="12"/>
    <text x="20" y="32" class="node-title">Grafana</text>
    <text x="20" y="56" class="node-text">Dashboards d'exploitation</text>
    <text x="20" y="76" class="node-text">Visualisation sur :3000</text>
  </g>

  <g transform="translate(280 920)">
    <rect class="support" width="260" height="96" rx="12"/>
    <text x="20" y="32" class="node-title">Docker Compose</text>
    <text x="20" y="56" class="node-text">api, streamlit, prometheus</text>
    <text x="20" y="76" class="node-text">mlflow, grafana</text>
  </g>

  <g transform="translate(960 920)">
    <rect class="support" width="260" height="96" rx="12"/>
    <text x="20" y="32" class="node-title">GitHub Actions</text>
    <text x="20" y="56" class="node-text">fetch dataset, build, train, test</text>
    <text x="20" y="76" class="node-text">validation docker</text>
  </g>

  <path d="M750 156 L750 210" class="flow"/>
  <path d="M750 306 L750 360" class="flow"/>
  <path d="M750 456 L750 620" class="flow"/>
  <path d="M750 716 L750 770" class="flow"/>
  <path d="M750 866 L750 920" class="flow"/>
  <path d="M750 1016 L750 1070" class="flow"/>

  <path d="M880 408 L960 408" class="flow"/>
  <path d="M960 408 C960 520 830 520 750 620" class="flow"/>
  <path d="M620 408 L540 408" class="flow"/>

  <path d="M620 818 L540 818" class="flow"/>
  <path d="M880 818 L960 818" class="flow"/>
  <path d="M750 866 C750 900 750 900 750 920" class="flow"/>

  <path d="M1090 866 C1090 900 1040 900 880 968" class="flow"/>

  <path d="M1090 968 C1090 780 1110 620 1220 620" class="control"/>
  <path d="M1090 968 C1090 700 1110 430 860 408" class="control"/>
  <path d="M1090 968 C1090 760 1110 520 860 258" class="control"/>

  <path d="M540 968 C620 968 620 860 620 818" class="control"/>
  <path d="M540 968 C620 968 980 818 960 818" class="control"/>
  <path d="M540 968 C610 968 680 968 620 968" class="control"/>

  <text x="70" y="1188" class="legend">Fichier asset SVG sobre pour slides, README ou support PDF.</text>
</svg>
