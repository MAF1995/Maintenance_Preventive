name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Fetch dataset subset
        run: python -m maintenance_preventive.data.fetch_dataset

      - name: Build feature store
        run: python -m maintenance_preventive.features.engineering

      - name: Train baseline model
        run: python -m maintenance_preventive.models.train

      - name: Run tests
        run: pytest

      - name: Upload baseline artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: baseline-artifacts
          path: |
            artifacts/metrics/baseline_metrics.json
            artifacts/predictions/test_predictions.csv
          if-no-files-found: warn

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t maintenance-preventive:ci .

      - name: Validate Docker Compose
        run: docker compose config
