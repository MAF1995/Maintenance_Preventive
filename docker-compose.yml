services:
  api:
    container_name: maintenance_preventive_api
    build: .
    command: python -m uvicorn maintenance_preventive.api.main:app --host 0.0.0.0 --port 8010
    ports:
      - "8011:8010"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  streamlit:
    container_name: maintenance_preventive_streamlit
    build: .
    command: streamlit run dashboard/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      MAINTENANCE_API_BASE_URL: http://api:8010
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    container_name: maintenance_preventive_prometheus
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      api:
        condition: service_healthy

  mlflow:
    container_name: maintenance_preventive_mlflow
    build: .
    command:
      - python
      - -m
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////app/artifacts/mlflow/mlflow.db
      - --default-artifact-root
      - file:///app/artifacts/mlflow/artifacts
      - --no-serve-artifacts
    ports:
      - "5000:5000"
    volumes:
      - ./artifacts:/app/artifacts

  grafana:
    container_name: maintenance_preventive_grafana
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - mlflow
